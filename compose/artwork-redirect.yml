services:
  artwork-redirect:
    build:
      context: build/artwork-redirect
    ports:
      - "${ARTWORK_REDIRECT_PORT:-8081}:8081"

  musicbrainz:
    environment:
      - COVER_ART_ARCHIVE_DOWNLOAD_PREFIX=http://artwork-redirect:8081
      - EVENT_ART_ARCHIVE_DOWNLOAD_PREFIX=http://artwork-redirect:8081
